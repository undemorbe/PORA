name: pora
description: "PORA"
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.12.2
dependencies:
  flutter:
    sdk: flutter
  flutter_localization: ^0.4.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  mobx: ^2.6.0
  intl: ^0.20.2
  auto_route: ^11.1.0
  flutter_mobx: ^2.3.0
  get_it: ^9.2.1
  flutter_dotenv: ^6.0.1
  talker_flutter: ^5.1.17
  phosphor_flutter: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  auto_route_generator: ^10.5.0
  mobx_codegen: ^2.7.7
  change_app_package_name: ^1.5.0

flutter:
  uses-material-design: true
  generate: true
  fonts:
      - family: Inter
        fonts:
              - asset: assets/fonts/Inter-Regular.ttf
              - asset: assets/fonts/Inter-Medium.ttf
                weight: 500
              - asset: assets/fonts/Inter-SemiBold.ttf
                weight: 600
              - asset: assets/fonts/Inter-Bold.ttf
                weight: 700
              - asset: assets/fonts/Inter-ExtraBold.ttf
                weight: 800
